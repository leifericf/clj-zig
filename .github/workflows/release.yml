name: Release

# Manual release: the maintainer triggers this to publish clj-zig to
# Clojars. CI on push to main stays the test gate; releasing is deliberate.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (blank uses today's date, YYYY.MM.DD)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Clojars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.0
        with:
          cli: latest

      - name: Deploy
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
          CLJ_ZIG_VERSION: ${{ inputs.version }}
        run: clojure -T:build deploy
